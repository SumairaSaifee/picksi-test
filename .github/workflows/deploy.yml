name: Deploy to K8s

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Backend Image
      - name: Build Backend Image
        run: docker build --no-cache -t sumairasaifee/backend:${{ github.sha }} ./backend

      - name: Push Backend Image
        run: docker push sumairasaifee/backend:${{ github.sha }}

      # Frontend Image
      - name: Build Frontend Image
        run: docker build --no-cache -t sumairasaifee/frontend:${{ github.sha }} ./frontend

      - name: Push Frontend Image
        run: docker push sumairasaifee/frontend:${{ github.sha }}

      # Update manifests so ArgoCD detects the change
      - name: Update image tags in manifests
        run: |
          sed -i 's|sumairasaifee/backend:.*|sumairasaifee/backend:${{ github.sha }}|' k8s/backend-deployment.yaml
          sed -i 's|sumairasaifee/frontend:.*|sumairasaifee/frontend:${{ github.sha }}|' k8s/frontend-deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/
          git commit -m "Update image tags to ${{ github.sha }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}