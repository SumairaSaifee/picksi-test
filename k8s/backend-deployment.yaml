apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: nginx
        image: sumairasaifee/backend:ba4ed1adb44656754f70d31bba91b973c4627d54
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
