name: Deploy to K8s

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to DockerHub
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Backend Image
      - name: Build Backend Image
        run: docker build --no-cache -t sumairasaifee/backend:latest ./backend

      - name: Push Backend Image
        run: docker push sumairasaifee/backend:latest

      # Frontend Image
      - name: Build Frontend Image
        run: docker build --no-cache -t sumairasaifee/frontend:latest ./frontend

      - name: Push Frontend Image
        run: docker push sumairasaifee/frontend:latest
