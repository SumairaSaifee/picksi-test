apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: nginx
        image: sumairasaifee/frontend:3e9597ab3c38a876399e53022b075cb9851a6f9b
        imagePullPolicy: Always
        ports:
        - containerPort: 80
